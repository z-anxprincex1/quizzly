steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/quizly-backend:$COMMIT_SHA"
      - "-f"
      - "backend/Dockerfile"
      - "backend"
    id: "build-backend"

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/quizly-backend:$COMMIT_SHA"
    id: "push-backend"
    waitFor: ["build-backend"]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "quizly-backend"
      - "--image"
      - "gcr.io/$PROJECT_ID/quizly-backend:$COMMIT_SHA"
      - "--region"
      - "us-central1"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--port"
      - "8080"
      - "--session-affinity"
      - "--set-env-vars"
      - "DATABASE_URL=$_DATABASE_URL,JWT_SECRET=$_JWT_SECRET"
    id: "deploy-backend"
    waitFor: ["push-backend"]

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/quizly-ai:$COMMIT_SHA"
      - "-f"
      - "ai-service/Dockerfile"
      - "ai-service"
    id: "build-ai"
    waitFor: ["deploy-backend"]

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/quizly-ai:$COMMIT_SHA"
    id: "push-ai"
    waitFor: ["build-ai"]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "quizly-ai"
      - "--image"
      - "gcr.io/$PROJECT_ID/quizly-ai:$COMMIT_SHA"
      - "--region"
      - "us-central1"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--port"
      - "8080"
      - "--set-env-vars"
      - "GEMINI_API_KEY=$_GEMINI_API_KEY,GEMINI_MODEL=$_GEMINI_MODEL"
    id: "deploy-ai"
    waitFor: ["push-ai"]

images:
  - "gcr.io/$PROJECT_ID/quizly-backend:$COMMIT_SHA"
  - "gcr.io/$PROJECT_ID/quizly-ai:$COMMIT_SHA"

options:
  logging: CLOUD_LOGGING_ONLY
